name: build
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - run: chmod +x gradlew && ./gradlew build --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: jars
          path: build/libs/*.jar
